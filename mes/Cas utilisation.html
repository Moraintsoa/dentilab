<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flux Cas d'Utilisation — Cabinet Dentaire SaaS</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0d1117; --sur:#161b22; --sur2:#1c2430; --sur3:#21262d;
  --border:#30363d; --text:#e6edf3; --muted:#768390; --muted2:#505968;
  --green:#3fb950; --red:#f85149; --yellow:#d29922; --blue:#58a6ff;
  --purple:#bc8cff; --orange:#f0883e; --cyan:#39c5cf; --pink:#e06aaa;
  --teal:#2ea043;
}
body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;min-height:100vh;display:flex;flex-direction:column;}

/* ─── HEADER ─── */
header{
  padding:16px 28px;border-bottom:1px solid var(--border);
  background:var(--sur);display:flex;align-items:center;gap:16px;flex-wrap:wrap;
}
h1{font-family:'DM Serif Display',serif;font-size:20px;letter-spacing:-.5px;}
.sub{font-size:9px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;}
.header-stats{margin-left:auto;display:flex;gap:8px;flex-wrap:wrap;}
.hstat{background:var(--sur2);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:10px;color:var(--muted);}
.hstat strong{color:var(--text);}

/* ─── LAYOUT ─── */
.layout{display:grid;grid-template-columns:240px 1fr;flex:1;min-height:0;}

/* ─── SIDEBAR NAV ─── */
.sidenav{
  border-right:1px solid var(--border);background:var(--sur);
  overflow-y:auto;padding:12px 0;
}
.nav-section-label{
  padding:8px 16px 4px;font-size:8.5px;letter-spacing:2.5px;
  text-transform:uppercase;color:var(--muted2);
}
.nav-item{
  padding:8px 16px;font-size:10.5px;cursor:pointer;
  display:flex;align-items:center;gap:9px;
  transition:all .15s;border-left:3px solid transparent;
  color:var(--muted);
}
.nav-item:hover{background:var(--sur2);color:var(--text);}
.nav-item.active{
  background:var(--sur2);color:var(--text);
  border-left-color:var(--actor-color, var(--blue));
}
.nav-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.nav-count{margin-left:auto;font-size:8.5px;background:var(--sur3);padding:1px 6px;border-radius:10px;color:var(--muted);}

/* ─── MAIN CONTENT ─── */
.main{overflow-y:auto;padding:24px 28px;}

/* Actor header */
.actor-header{
  display:flex;align-items:center;gap:16px;margin-bottom:20px;
  padding:16px 20px;border-radius:12px;border:1px solid;
}
.actor-icon{font-size:28px;}
.actor-name{font-family:'DM Serif Display',serif;font-size:20px;}
.actor-desc{font-size:10px;color:var(--muted);margin-top:2px;line-height:1.6;}
.actor-badge{
  margin-left:auto;padding:6px 14px;border-radius:20px;
  font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;
}

/* Use case groups */
.uc-groups{display:flex;flex-direction:column;gap:16px;}
.uc-group{
  background:var(--sur);border:1px solid var(--border);border-radius:12px;overflow:hidden;
}
.uc-group-header{
  padding:12px 16px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;cursor:pointer;
  transition:background .15s;user-select:none;
}
.uc-group-header:hover{background:var(--sur2);}
.ug-icon{font-size:16px;}
.ug-title{font-size:11px;font-weight:600;letter-spacing:.3px;}
.ug-count{margin-left:auto;font-size:9px;color:var(--muted);background:var(--sur3);padding:2px 8px;border-radius:10px;}
.ug-chevron{color:var(--muted);font-size:11px;transition:transform .2s;}
.ug-chevron.open{transform:rotate(90deg);}

/* Use cases */
.uc-list{padding:8px;}
.uc-item{
  border-radius:8px;margin-bottom:4px;overflow:hidden;
  border:1px solid var(--border);transition:border-color .15s;
}
.uc-item:hover{border-color:var(--muted);}
.uc-item.expanded{border-color:var(--actor-color, var(--blue));}

.uc-main{
  padding:10px 14px;display:flex;align-items:center;gap:10px;
  cursor:pointer;background:var(--sur2);
}
.uc-num{
  width:22px;height:22px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:9px;font-weight:700;flex-shrink:0;
  background:var(--sur3);color:var(--muted);
}
.uc-title{font-size:11px;flex:1;}
.uc-tags{display:flex;gap:4px;flex-wrap:wrap;}
.uc-tag{
  font-size:8px;padding:1px 7px;border-radius:10px;font-weight:600;
  letter-spacing:.5px;text-transform:uppercase;
}
.tag-db{background:#58a6ff15;color:var(--blue);border:1px solid #58a6ff30;}
.tag-trigger{background:#bc8cff15;color:var(--purple);border:1px solid #bc8cff30;}
.tag-notify{background:#39c5cf15;color:var(--cyan);border:1px solid #39c5cf30;}
.tag-audit{background:#f0883e15;color:var(--orange);border:1px solid #f0883e30;}
.tag-critical{background:#f8514915;color:var(--red);border:1px solid #f8514930;}

/* Expanded flow */
.uc-detail{
  background:var(--sur3);border-top:1px solid var(--border);
  padding:14px 16px;display:none;
}
.uc-item.expanded .uc-detail{display:block;}

.flow-steps{display:flex;flex-direction:column;gap:0;}
.flow-step{
  display:flex;align-items:flex-start;gap:12px;position:relative;
  padding-bottom:4px;
}
.flow-step:not(:last-child) .step-line{
  position:absolute;left:13px;top:26px;bottom:0;width:2px;
  background:var(--border);
}
.step-circle{
  width:26px;height:26px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:9px;font-weight:700;flex-shrink:0;
  border:2px solid;z-index:1;background:var(--sur3);
}
.step-body{flex:1;padding:3px 0 12px;}
.step-action{font-size:10.5px;line-height:1.5;margin-bottom:4px;}
.step-tables{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px;}
.step-table{
  font-size:8.5px;padding:1px 8px;border-radius:4px;
  background:var(--sur2);border:1px solid var(--border);color:var(--cyan);
  font-family:'DM Mono',monospace;
}
.step-table.write{color:var(--green);background:#3fb95010;border-color:#3fb95030;}
.step-table.read{color:var(--blue);background:#58a6ff10;border-color:#58a6ff30;}
.step-table.trigger{color:var(--purple);background:#bc8cff10;border-color:#bc8cff30;}
.step-note{font-size:9px;color:var(--muted);margin-top:3px;font-style:italic;}

/* Conditions / alternatives */
.step-alt{
  background:var(--sur2);border:1px solid var(--border);border-radius:6px;
  padding:7px 10px;margin-top:6px;font-size:9.5px;color:var(--muted);
}
.step-alt strong{color:var(--yellow);}

/* Tables involved summary */
.uc-tables-summary{
  display:flex;flex-wrap:wrap;gap:4px;padding:10px 14px;
  border-top:1px solid var(--border);background:var(--sur2);
}
.uts-label{font-size:8.5px;color:var(--muted);margin-right:4px;align-self:center;}

/* overview cards */
.overview-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-bottom:24px;}
.ov-card{
  background:var(--sur);border:1px solid var(--border);border-radius:10px;
  padding:14px 16px;cursor:pointer;transition:all .2s;
}
.ov-card:hover{transform:translateY(-2px);border-color:var(--muted);}
.ov-icon{font-size:22px;margin-bottom:8px;}
.ov-name{font-size:11px;font-weight:600;margin-bottom:4px;}
.ov-desc{font-size:9.5px;color:var(--muted);line-height:1.6;}
.ov-count{
  display:inline-block;margin-top:8px;font-size:9px;
  padding:2px 8px;border-radius:10px;
}
</style>
</head>
<body>

<header>
  <div>
    <h1>Cas d'Utilisation</h1>
    <div class="sub">Architecture BDD · Cabinet Dentaire SaaS</div>
  </div>
  <div class="header-stats">
    <div class="hstat"><strong>6</strong> acteurs</div>
    <div class="hstat"><strong>48</strong> cas d'utilisation</div>
    <div class="hstat"><strong>22</strong> tables impliquées</div>
  </div>
</header>

<div class="layout">

  <!-- ─── SIDENAV ─── -->
  <nav class="sidenav">
    <div class="nav-section-label">Vue globale</div>
    <div class="nav-item active" style="--actor-color:#58a6ff" onclick="showActor('overview',this)">
      <div class="nav-dot" style="background:#58a6ff"></div>Tous les flux<div class="nav-count">48</div>
    </div>

    <div class="nav-section-label" style="margin-top:8px">Acteurs</div>
    <div class="nav-item" style="--actor-color:#3fb950" onclick="showActor('admin',this)">
      <div class="nav-dot" style="background:#3fb950"></div>Admin Cabinet<div class="nav-count">8</div>
    </div>
    <div class="nav-item" style="--actor-color:#58a6ff" onclick="showActor('docteur',this)">
      <div class="nav-dot" style="background:#58a6ff"></div>Docteur<div class="nav-count">16</div>
    </div>
    <div class="nav-item" style="--actor-color:#f0883e" onclick="showActor('secretaire',this)">
      <div class="nav-dot" style="background:#f0883e"></div>Secrétaire<div class="nav-count">10</div>
    </div>
    <div class="nav-item" style="--actor-color:#bc8cff" onclick="showActor('patient',this)">
      <div class="nav-dot" style="background:#bc8cff"></div>Patient (portail)<div class="nav-count">5</div>
    </div>
    <div class="nav-item" style="--actor-color:#39c5cf" onclick="showActor('systeme',this)">
      <div class="nav-dot" style="background:#39c5cf"></div>Système (auto)<div class="nav-count">6</div>
    </div>
    <div class="nav-item" style="--actor-color:#e06aaa" onclick="showActor('rgpd',this)">
      <div class="nav-dot" style="background:#e06aaa"></div>DPO / RGPD<div class="nav-count">3</div>
    </div>
  </nav>

  <!-- ─── MAIN ─── -->
  <div class="main" id="main-content">
    <!-- Rendered by JS -->
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
//  DATA — All use case flows
// ═══════════════════════════════════════════════════════

const ACTORS = {

  admin: {
    icon:'🏥', name:'Admin Cabinet', color:'#3fb950',
    desc:'Responsable du cabinet SaaS. Configure le compte, gère les utilisateurs, consulte les rapports financiers et supervise les stocks.',
    groups:[
      {
        icon:'⚙️', title:'Configuration du Cabinet', cases:[
          {
            id:'A1', title:"Création et configuration du cabinet",
            tags:['db','audit'],
            steps:[
              {n:1,color:'#3fb950',action:"L'admin crée le compte cabinet (inscription SaaS)",tables:[{n:'CABINETS',t:'write'}],note:"Génère un slug unique (sous-domaine)"},
              {n:2,color:'#3fb950',action:"Paramétrage des horaires d'ouverture et configuration générale",tables:[{n:'CABINETS',t:'write'}]},
              {n:3,color:'#3fb950',action:"Création du premier compte utilisateur (docteur) lié au cabinet",tables:[{n:'USERS',t:'write'}],note:"role='docteur', numero_rpps requis"},
              {n:4,color:'#bc8cff',action:"Trigger automatique : audit log de création",tables:[{n:'AUDIT_LOGS',t:'trigger'}]},
            ],

          },
          {
            id:'A2', title:"Gestion des utilisateurs (ajout secrétaire / assistante)",
            tags:['db','audit'],
            steps:[
              {n:1,color:'#3fb950',action:"L'admin crée un nouveau compte utilisateur avec rôle spécifique",tables:[{n:'USERS',t:'write'}]},

              {n:4,color:'#bc8cff',action:"Audit log de la création d'utilisateur",tables:[{n:'AUDIT_LOGS',t:'trigger'}]},
            ]
          },
          {
            id:'A3', title:"Gestion du plan d'abonnement SaaS",
            tags:['db'],
            steps:[
              {n:1,color:'#3fb950',action:"Consultation du plan actuel et des limites (nb patients, stockage…)",tables:[{n:'CABINETS',t:'read'}]},
              {n:2,color:'#3fb950',action:"Mise à jour du plan (free → pro → enterprise)",tables:[{n:'CABINETS',t:'write'}],note:"plan_abonnement enum strict"},
            ]
          },
        ]
      },
      {
        icon:'📊', title:'Rapports & Supervision', cases:[
          {
            id:'A4', title:"Génération d'un rapport de chiffre d'affaires",
            tags:['db','trigger'],
            steps:[
              {n:1,color:'#3fb950',action:"L'admin paramètre la période et le type de rapport (CA, actes, patients)",tables:[{n:'REPORTS',t:'write'}]},
              {n:2,color:'#3fb950',action:"Agrégation des données de facturation sur la période",tables:[{n:'INVOICES',t:'read'},{n:'INVOICE_ITEMS',t:'read'},{n:'PAYMENT_TRANSACTIONS',t:'read'}]},

            ]
          },
          {
            id:'A5', title:"Supervision des stocks et alertes inventaire",
            tags:['db','notify'],
            steps:[
              {n:1,color:'#3fb950',action:"Consultation du tableau de bord des stocks en temps réel",tables:[{n:'INVENTORY_ITEMS',t:'read'},{n:'INVENTORY_MOVEMENTS',t:'read'}]},
              {n:2,color:'#39c5cf',action:"Visualisation des articles sous le seuil min_threshold",tables:[{n:'INVENTORY_ITEMS',t:'read'}]},
              {n:3,color:'#3fb950',action:"Commande fournisseur déclenchée manuellement",tables:[{n:'INVENTORY_MOVEMENTS',t:'write'}],note:"movement_type='entree'"},
            ]
          },
          {
            id:'A6', title:"Consultation du rapport d'activité patients",

            steps:[

              {n:2,color:'#3fb950',action:"Statistiques d'actes les plus fréquents",tables:[{n:'TREATMENTS',t:'read'},{n:'TREATMENT_PLAN_ITEMS',t:'read'}]},
              {n:3,color:'#3fb950',action:"Sauvegarde en snapshot rapport",tables:[{n:'REPORTS',t:'write'}]},
            ]
          },
          {
            id:'A7', title:"Visualisation des paiements en attente",

              {n:2,color:'#3fb950',action:"Déclenchement des relances de paiement",tables:[{n:'NOTIFICATIONS',t:'write'}],note:"type='facture_impayee', canal email/sms"},

          },
          {
            id:'A8', title:"Export des données cabinet (sauvegarde)",

            steps:[

              {n:3,color:'#3fb950',action:"Fichier généré et lien sécurisé envoyé par email",tables:[{n:'NOTIFICATIONS',t:'write'}]},
            ]
          },
        ]
      }
    ]
  },

function showActor(id, navEl) {
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  navEl.classList.add('active');
  const main = document.getElementById('main-content');
  if(id==='overview') { renderOverview(main); return; }
  const actor = ACTORS[id];
  if(!actor) return;
  renderActor(main, actor);
}

function renderOverview(main) {
  const cards = Object.entries(ACTORS).map(([id,a])=>{
    const totalUC = a.groups.reduce((s,g)=>s+g.cases.length,0);
    return `<div class="ov-card" onclick="document.querySelector('[onclick*=\\'${id}\\']').click()">
      <div class="ov-icon">${a.icon}</div>
      <div class="ov-name" style="color:${a.color}">${a.name}</div>
      <div class="ov-desc">${a.desc}</div>
      <span class="ov-count" style="background:${a.color}20;color:${a.color};border:1px solid ${a.color}40">${totalUC} cas d'utilisation</span>
    </div>`;
  }).join('');

  // All flows flat list
  const allFlows = Object.entries(ACTORS).flatMap(([aid,a])=>
    a.groups.flatMap(g=>g.cases.map(c=>({...c,actorId:aid,actor:a,group:g})))
  );

  const flowList = allFlows.map(f=>`
    <div class="uc-item" id="flow-${f.id}">
      <div class="uc-main" onclick="toggleUC('flow-${f.id}')">
        <div class="uc-num" style="background:${f.actor.color}20;color:${f.actor.color}">${f.id}</div>
        <span class="uc-title">${f.actor.icon} ${f.title}</span>
        <div class="uc-tags">
          ${f.tags.map(t=>`<span class="uc-tag tag-${t}">${tagLabel(t)}</span>`).join('')}
        </div>
      </div>
      ${renderDetail(f)}
    </div>`).join('');

  main.innerHTML=`
    <div style="margin-bottom:20px">
      <div style="font-family:'DM Serif Display',serif;font-size:22px;margin-bottom:6px">Tous les flux</div>
      <div style="font-size:10px;color:var(--muted)">48 cas d'utilisation · 6 acteurs · Cliquez pour déplier chaque flux</div>
    </div>
    <div class="overview-grid">${cards}</div>
    <div style="font-size:11px;font-weight:600;margin-bottom:12px;letter-spacing:.5px">Liste complète des flux</div>
    <div class="uc-groups"><div class="uc-group"><div class="uc-list">${flowList}</div></div></div>`;
}

function renderActor(main, actor) {
  const color = actor.color;
  const totalUC = actor.groups.reduce((s,g)=>s+g.cases.length,0);

  const groupsHTML = actor.groups.map((g,gi)=>`
    <div class="uc-group">
      <div class="uc-group-header" onclick="toggleGroup(this)">
        <span class="ug-icon">${g.icon}</span>
        <span class="ug-title">${g.title}</span>
        <span class="ug-count">${g.cases.length} flux</span>
        <span class="ug-chevron open">›</span>
      </div>
      <div class="uc-list" style="display:block">
        ${g.cases.map(c=>`
          <div class="uc-item" id="uc-${c.id}">
            <div class="uc-main" onclick="toggleUC('uc-${c.id}')">
              <div class="uc-num" style="background:${color}20;color:${color}">${c.id}</div>
              <span class="uc-title">${c.title}</span>
              <div class="uc-tags">
                ${c.tags.map(t=>`<span class="uc-tag tag-${t}">${tagLabel(t)}</span>`).join('')}
              </div>
            </div>
            ${renderDetail(c)}
          </div>`).join('')}
      </div>
    </div>`).join('');

  main.innerHTML=`
    <div class="actor-header" style="background:${color}10;border-color:${color}40;margin-bottom:20px">
      <span class="actor-icon">${actor.icon}</span>
      <div>
        <div class="actor-name" style="color:${color}">${actor.name}</div>
        <div class="actor-desc">${actor.desc}</div>
      </div>
      <div class="actor-badge" style="background:${color}20;color:${color};border:1px solid ${color}40">${totalUC} cas d'utilisation</div>
    </div>
    <div class="uc-groups">${groupsHTML}</div>`;
}

function renderDetail(c) {
  const stepsHTML = c.steps.map((s,i)=>`
    <div class="flow-step">
      <div style="position:relative">
        <div class="step-circle" style="color:${s.color};border-color:${s.color}40;background:${s.color}12">${s.n}</div>
        ${i<c.steps.length-1?`<div style="position:absolute;left:11px;top:28px;bottom:-14px;width:2px;background:var(--border);z-index:0"></div>`:''}
      </div>
      <div class="step-body">
        <div class="step-action">${s.action}</div>
        ${s.tables?`<div class="step-tables">${s.tables.map(t=>`<span class="step-table ${t.t}">${t.n}</span>`).join('')}</div>`:''}
        ${s.note?`<div class="step-note">↳ ${s.note}</div>`:''}
      </div>
    </div>`).join('');

  const altHTML = c.alt?`<div class="step-alt"><strong>⚡ Cas alternatif :</strong> ${c.alt}</div>`:'';
  const allTables = [...new Set(c.steps.flatMap(s=>(s.tables||[]).map(t=>t.n)))];

  return `
    <div class="uc-detail">
      <div class="flow-steps">${stepsHTML}</div>
      ${altHTML}
    </div>
    <div class="uc-tables-summary">
      <span class="uts-label">Tables :</span>
      ${allTables.map(t=>`<span class="step-table">${t}</span>`).join('')}
    </div>`;
}

function tagLabel(t) {
  return {db:'BDD',trigger:'Trigger',notify:'Notif.',audit:'Audit',critical:'⚠ Critique'}[t]||t;
}

function toggleUC(id) {
  const el = document.getElementById(id);
  if(!el) return;
  el.classList.toggle('expanded');
}

function toggleGroup(header) {
  const list = header.nextElementSibling;
  const chev = header.querySelector('.ug-chevron');
  const open = list.style.display !== 'none';
  list.style.display = open ? 'none' : 'block';
  chev.classList.toggle('open', !open);
}

// ── INIT ──
const overviewNavItem = document.querySelector('.nav-item.active');
renderOverview(document.getElementById('main-content'));
</script>
</body>
</html>
